site: DevOps & SRE Portfolio
title: Robertus - DevOps & SRE Expert
greetings: Hello, World.
description: >-
  Portfolio of Robertus, bridging the gap between development and operations.
lang: en-US
timezone:  Asia/Jakarta
repo: https://github.com/robertusnegoro/robertusnegoro.github.io # site repo [optional]
data-theme: dark # default theme "dark" | "light"

author:
  name: Robertus
  bio: Part time Engineer, Full time Dad
  available_for_hire: false
  userpicture: sunny.png
  username: robinegoro # general username
  github: robertusnegoro # github username
  twitter: robinegoro # twitter username
  email: kontak@robee.id # email adress

# Font Settings
googlewebfonts: family=Anton&family=Inter:wght@400;500;600;700

# URL settings
url: "https://www.robee.id" # Domain Name of host. [username].github.io for github pages
baseurl: "" # sub folder for jekyll site. only if jekyll site not in root of host. leave blank if not wishd. always add / in front.
permalink: pretty

# local
# url: "http://localhost:4000" # 
# baseurl: "" # 


markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md
  
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false


